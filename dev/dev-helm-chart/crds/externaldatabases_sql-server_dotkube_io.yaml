apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: externaldatabases.sql-server.dotkube.io
spec:
  group: sql-server.dotkube.io
  names:
    kind: ExternalDatabase
    listKind: ExternalDatabaseList
    plural: externaldatabases
    singular: externaldatabase
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        properties:
          status:
            description: Status of the external SQL Server database.
            properties:
              state:
                description: The current state of the database.
                type: string
              message:
                description: A message indicating the current status of the database.
                type: string
              lastChecked:
                description: The last time the database status was checked.
                format: date-time
                nullable: true
                type: string
              isAvailable:
                description: Whether the database is available on the instance.
                type: boolean
            type: object
          spec:
            description: Spec of the external SQL Server database.
            properties:
              instanceName:
                description: The name of the SQLServer or ExternalSQLServer instance where the database exists.
                type: string
              databaseName:
                description: The name of the existing database.
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}