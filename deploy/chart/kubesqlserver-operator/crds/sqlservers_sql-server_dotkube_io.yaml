apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: sqlservers.sql-server.dotkube.io
spec:
  group: sql-server.dotkube.io
  names:
    kind: SQLServer
    listKind: SQLServerList
    plural: sqlservers
    singular: sqlserver
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        properties:
          status:
            description: Status of the SQL Server deployment.
            properties:
              state:
                description: The current state of the SQL Server deployment.
                type: string
              message:
                description: A message providing details on the current status of SQL Server.
                type: string
            type: object
          spec:
            description: Spec of the SQL Server deployment.
            properties:
              image:
                description: The container image to use for SQL Server.
                type: string
              storageClass:
                description: The name of the storage class to use for SQL Server storage.
                type: string
              storageSize:
                description: The size of the persistent storage volume.
                type: string
              identity:
                description: The identity configuration for the SQL Server.
                properties:
                  authType:
                    description: The type of authentication to use for the SQL Server connection. Valid values are SqlLogin, WorkloadIdentity, and AppRegistration.
                    enum:
                    - SqlLogin
                    - WorkloadIdentity
                    - AppRegistration
                    type: string
                  secretName:
                    description: The name of the Kubernetes secret containing SQL Server credentials (must contain 'password' and 'username' keys).
                    nullable: true
                    type: string
                  serviceAccountName:
                    description: The name of the ServiceAccount to use for Workload Identity.
                    nullable: true
                    type: string
                  clientId:
                    description: The Client ID of the Managed Identity or App Registration.
                    nullable: true
                    type: string
                  tenantId:
                    description: The Tenant ID for the Managed Identity or App Registration.
                    nullable: true
                    type: string
                type: object
              serviceType:
                description: The type of Kubernetes service to expose SQL Server (e.g., ClusterIP, NodePort, LoadBalancer).
                nullable: true
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}