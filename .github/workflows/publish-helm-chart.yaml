name: publish-helm-oci

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Optional chart version (SemVer). Defaults to datetime-based version."
        required: false
  push:
    branches:
      - main
    paths:
      - 'deploy/chart/kubesqlserver-operator/**'
      - '.github/workflows/publish-helm-chart.yaml'

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  CHART_DIR: deploy/chart/kubesqlserver-operator

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      owner_lc: ${{ steps.vars.outputs.owner_lc }}
      chart_version: ${{ steps.vars.outputs.chart_version }}
      chart_name: ${{ steps.vars.outputs.chart_name }}
    steps:
      - uses: actions/checkout@v6
      - name: Set variables
        id: vars
        run: |
          echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
          
          # Use manual version if provided, otherwise generate one based on datetime: 0.0.0-YYYYMMDDHHMMSS
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "chart_version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "chart_version=0.0.0-$(date +'%Y%m%d%H%M%S')" >> "$GITHUB_OUTPUT"
          fi
          
          # Extract chart name from Chart.yaml
          CHART_NAME=$(yq .name ${{ env.CHART_DIR }}/Chart.yaml)
          echo "chart_name=$CHART_NAME" >> "$GITHUB_OUTPUT"

  publish-versioned:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: azure/setup-helm@v4
        with:
          version: v3.15.2

      - name: Login to GHCR for Helm
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login "$REGISTRY" -u "${{ github.actor }}" --password-stdin

      - name: Package and Push Versioned Chart
        run: |
          mkdir -p "$CHART_DIR/.artifacts"
          cd "$CHART_DIR"
          echo "Packaging chart with version: ${{ needs.prepare.outputs.chart_version }}"
          helm package . --version "${{ needs.prepare.outputs.chart_version }}" --destination .artifacts
          helm push ".artifacts/${{ needs.prepare.outputs.chart_name }}-${{ needs.prepare.outputs.chart_version }}.tgz" "oci://$REGISTRY/${{ needs.prepare.outputs.owner_lc }}/chart"
